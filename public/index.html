<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <header class="bg-white shadow-sm">
    <div class="max-w-4xl mx-auto px-4 py-6">
      <h1 class="text-3xl md:text-4xl font-extrabold text-indigo-600">Contact</h1>
    </div>
  </header>
  <main class="max-w-4xl mx-auto px-4 py-10" id="main-content" role="main">
    <p class="text-slate-700 mb-6">お問い合わせページへようこそ！</p>
    <div class="bg-white rounded-lg shadow-md p-6">
      <div class="mb-4">
        <h2 class="text-2xl font-semibold text-slate-800">Contact Form</h2>
      </div>
      <div>
        <form action="/api/contact" method="POST" class="space-y-4">
          <div>
            <label for="name" class="block text-sm font-medium text-slate-700">お名前</label>
            <input type="text" id="name" name="name" maxlength="100" autocomplete="name" required class="mt-1 block w-full rounded-md border border-gray-300 bg-white px-3 py-2 text-sm shadow-sm placeholder-gray-400 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
          </div>
          <div>
            <label for="email" class="block text-sm font-medium text-slate-700">メールアドレス</label>
            <input type="email" id="email" name="email" maxlength="254" autocomplete="email" required class="mt-1 block w-full rounded-md border border-gray-300 bg-white px-3 py-2 text-sm shadow-sm placeholder-gray-400 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
          </div>
          <div>
            <label for="message" class="block text-sm font-medium text-slate-700">お問い合わせ内容</label>
            <textarea id="message" name="message" maxlength="3000" required rows="6" class="mt-1 block w-full rounded-md border border-gray-300 bg-white px-3 py-2 text-sm shadow-sm placeholder-gray-400 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"></textarea>
          </div>
          <div class="pt-2">
            <button type="submit" class="inline-flex items-center justify-center rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">送信</button>
          </div>
        </form>
      </div>
    </div>
  </main>
  <footer class="mt-12">
    <div class="max-w-4xl mx-auto px-4 py-6 text-center text-sm text-slate-500">
      <p>&copy; 2026 Contact Page</p>
    </div>
  </footer>
  <script src="/js/contact.js"></script>
</body>
</html>
